<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MachFit Center — Reservas Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black-matte: #121212;
            --surface: #1E1E1E;
            --txt: #FFFFFF;
            --border: rgba(212, 175, 55, 0.3);
            --r: 10px;
        }

        body { font-family: 'Barlow', sans-serif; background: var(--black-matte); color: var(--txt); padding-bottom: 80px; margin: 0; }
        .page { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 25px; cursor: pointer; }
        .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }

        .day-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 20px; overflow: hidden; }
        .day-head { background: #000; padding: 12px 20px; color: var(--gold); text-transform: uppercase; font-size: 14px; border-bottom: 1px solid var(--border); font-weight: 700; }
        .slot { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.05); cursor: pointer; }
        .slot:hover { background: rgba(212, 175, 55, 0.1); }
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; }
        .modal { background: var(--surface); width: 90%; max-width: 450px; padding: 25px; border-radius: var(--r); border: 1px solid var(--gold); margin: 20px auto; }
        
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid var(--border); color: #fff; border-radius: 5px; margin-bottom: 15px; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 5px; }
        
        .bikes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .bike { aspect-ratio: 1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; }
        .bike.selected { background: var(--gold); color: #000; font-weight: 700; }
        .bike.taken { opacity: 0.2; cursor: not-allowed; background: #333; }
        
        .res-item { background: #2a2a2a; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .btn-cancel-user { background: none; border: 1px solid #ff5252; color: #ff5252; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

<div class="page">
    <header class="header" onclick="openAdmin()">
        <div class="logo">MACHFIT <span>CENTER</span></div>
        <p style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">INDOOR CYCLING BY MANU</p>
    </header>

    <div id="schedule-container"></div>

    <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
        <h3 style="color: var(--gold); margin-bottom: 15px; font-family:'Barlow Condensed'; letter-spacing:1px;">MIS RESERVAS ACTIVAS</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="check-code" placeholder="CÓDIGO (EJ: MF-01)" oninput="this.value = this.value.toUpperCase()" style="margin-bottom: 0;">
            <button class="btn-gold" onclick="viewMyRes()" style="width: auto; padding: 0 20px;">VER</button>
        </div>
        <div id="my-res-results" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="modal-reserve" class="overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--gold); margin-bottom:15px; font-family:'Barlow Condensed';"></h3>
        <input type="text" id="user-code" placeholder="CÓDIGO AFILIADO" oninput="this.value = this.value.toUpperCase()">
        <input type="text" id="user-name" placeholder="NOMBRE COMPLETO">
        <div class="bikes-grid" id="bikes-container"></div>
        <button class="btn-gold" onclick="processBooking()">CONFIRMAR RESERVA</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#aaa; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<div id="modal-admin" class="overlay">
    <div class="modal" style="max-width: 550px;">
        <h3 style="color:var(--gold); font-family:'Barlow Condensed';">PANEL DE CONTROL (ADMIN)</h3>
        <div id="admin-list" style="margin-top: 15px;"></div>
        <button class="btn-gold" onclick="document.getElementById('modal-admin').style.display='none'" style="margin-top:20px;">CERRAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVbQMp5Ic-BTlM1VJIfTeLa0rLN6inBXE",
        authDomain: "machfit-cycling.firebaseapp.com",
        databaseURL: "https://machfit-cycling-default-rtdb.firebaseio.com",
        projectId: "machfit-cycling",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let reservations = {};
    let selectedBike = null;
    let currentSlotKey = null;

    const schedule = {
        'Lunes': ['06:00-07:00', '07:00-08:00', '18:00-19:00', '19:00-20:00'],
        'Martes': ['06:00-07:00'],
        'Miércoles': ['06:00-07:00', '07:00-08:00', '18:00-19:00'],
        'Jueves': ['06:00-07:00'],
        'Viernes': ['06:00-07:00', '07:00-08:00', '18:00-19:00', '19:00-20:00']
    };

    onValue(ref(db, 'reservaciones'), (snap) => {
        reservations = snap.val() || {};
        renderSchedule();
        updateAdminList();
    });

    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';
        for (const [day, hours] of Object.entries(schedule)) {
            let html = `<div class="day-block"><div class="day-head">${day}</div>`;
            hours.forEach(hour => {
                const key = `${day}_${hour}`.replace(/:/g, '');
                const count = Object.values(reservations).filter(r => r.slot === key).length;
                html += `<div class="slot" onclick="openModal('${day}', '${hour}', '${key}')">
                    <div><b>${hour}</b><br><small style="color:#888;">Prof: Manu</small></div>
                    <div class="status-badge">${count}/11 CUPOS</div>
                </div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    window.openModal = (day, hour, key) => {
        currentSlotKey = key; selectedBike = null;
        document.getElementById('modal-title').innerText = `${day} ${hour}`;
        const taken = Object.values(reservations).filter(r => r.slot === key).map(r => parseInt(r.bike));
        const grid = document.getElementById('bikes-container');
        grid.innerHTML = '';
        for(let i=1; i<=11; i++){
            const div = document.createElement('div');
            div.className = `bike ${taken.includes(i) ? 'taken' : ''}`;
            div.innerText = i;
            if(!taken.includes(i)) div.onclick = () => {
                document.querySelectorAll('.bike').forEach(b => b.classList.remove('selected'));
                div.classList.add('selected'); selectedBike = i;
            };
            grid.appendChild(div);
        }
        document.getElementById('modal-reserve').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal-reserve').style.display = 'none';

    window.processBooking = async () => {
        const code = document.getElementById('user-code').value.trim().toUpperCase();
        const name = document.getElementById('user-name').value.trim();
        if(!code || !name || !selectedBike) return alert("Completa todos los campos.");
        const already = Object.values(reservations).some(r => r.slot === currentSlotKey && r.code === code);
        if(already) return alert("Ya tienes reserva en este horario.");
        await push(ref(db, 'reservaciones'), { code, name, bike: selectedBike, slot: currentSlotKey });
        alert("¡Reserva confirmada!"); closeModal();
    };

    // CONSULTAR Y CANCELAR (USUARIO)
    window.viewMyRes = () => {
        const code = document.getElementById('check-code').value.trim().toUpperCase();
        const results = document.getElementById('my-res-results');
        const myRes = Object.entries(reservations).filter(([id, r]) => r.code === code);
        
        if (!code) return alert("Ingresa tu código.");
        
        results.innerHTML = myRes.length ? myRes.map(([id, r]) => `
            <div class="res-item" style="background:#2a2a2a; border-left:3px solid var(--gold);">
                <div>
                    <b style="text-transform:uppercase;">${r.slot.replace('_',' ')}</b><br>
                    <span style="color:var(--gold); font-size:12px;">BICICLETA #${r.bike}</span>
                </div>
                <button class="btn-cancel-user" onclick="userCancel('${id}')">CANCELAR</button>
            </div>`).join('') : '<p style="font-size:13px; color:#888;">No tienes reservas activas.</p>';
    };

    window.userCancel = async (id) => {
        if(confirm("¿Deseas cancelar tu reserva y liberar el cupo?")) {
            await remove(ref(db, `reservaciones/${id}`));
            alert("Reserva cancelada.");
            viewMyRes();
        }
    };

    // ADMIN
    window.openAdmin = () => {
        if (prompt("Clave admin:") === "machfit2024") {
            document.getElementById('modal-admin').style.display = 'flex';
        }
    };

    function updateAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = Object.entries(reservations).map(([id, r]) => `
            <div class="res-item">
                <div><b>${r.name}</b> (${r.code})<br>${r.slot.replace('_',' ')} - Bici #${r.bike}</div>
                <button onclick="userCancel('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">X</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
