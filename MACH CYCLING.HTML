<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MachFit Center — Admin & Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0C0C0C; --surf: #1A1A1A; --txt: #FFF; --border: rgba(212, 175, 55, 0.4); }
        body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--txt); margin: 0; padding-bottom: 30px; }
        .page { max-width: 500px; margin: 0 auto; padding: 15px; }
        .header { text-align: center; padding: 25px 0; border-bottom: 2px solid var(--gold); margin-bottom: 20px; cursor: pointer; }
        .logo { font-family: 'Barlow Condensed'; font-size: 30px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
        
        /* CALENDARIO */
        .date-selector { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; }
        .date-item { min-width: 65px; padding: 12px 5px; background: var(--surf); border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; }
        .date-item.active { background: var(--gold); color: #000; font-weight: 700; }

        .slot { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 12px; cursor: pointer; }
        .status { font-size: 11px; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 20px; font-weight: 700; }

        /* MODALES */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .modal { background: var(--surf); width: 92%; max-width: 480px; padding: 20px; border-radius: 12px; border: 1px solid var(--gold); margin: auto; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 6px; }

        /* LISTAS */
        .class-list { background: #000; border-radius: 8px; padding: 10px; margin-bottom: 20px; border: 1px solid #333; max-height: 180px; overflow-y: auto; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 12px; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 700; }

        .bikes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .bike { aspect-ratio: 1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .bike.taken { opacity: 0.15; cursor: not-allowed; background: #333; }
        .bike.selected { background: var(--gold); color: #000; }

        .ws-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 999; text-decoration: none; }
    </style>
</head>
<body>

<div class="page">
    <header class="header" onclick="openAdmin()">
        <div class="logo">MACHFIT <span>CENTER</span></div>
        <p style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">GESTIÓN ELITE DE CLASES</p>
    </header>

    <div id="date-slider" class="date-selector"></div>
    <div id="slots-container"></div>

    <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 25px;">
        <h4 style="color:var(--gold); font-size: 14px;">AUTO-GESTIÓN SOCIOS</h4>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="check-code" placeholder="TU CÓDIGO" oninput="this.value = this.value.toUpperCase()" style="flex:1; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:5px;">
            <button onclick="viewMyRes()" style="background:var(--gold); border:none; padding:12px 20px; border-radius:5px; font-weight:700; cursor:pointer;">BUSCAR</button>
        </div>
        <div id="my-res-results" style="margin-top: 15px;"></div>
    </div>
</div>

<a href="https://wa.me/593987894766" class="ws-float" target="_blank">📲</a>

<div id="modal-reserve" class="overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--gold); margin:0; font-family:'Barlow Condensed'; font-size: 24px;"></h3>
        <p id="modal-date-full" style="font-size:13px; color:#888; margin-bottom:10px;"></p>
        
        <p style="font-size: 10px; color: var(--gold); margin-bottom: 5px; font-weight: 700;">QUIÉNES YA ESTÁN EN CLASE:</p>
        <div class="class-list" id="current-class-list"></div>

        <p style="font-size: 11px; color: #fff; margin-bottom: 10px;">ELIGE TU BICI:</p>
        <div class="bikes-grid" id="bikes-container"></div>
        
        <input type="text" id="user-code" placeholder="CÓDIGO AFILIADO" oninput="this.value = this.value.toUpperCase()" style="width:100%; padding:14px; background:#222; border:1px solid var(--border); color:white; margin-bottom:10px; border-radius:5px; box-sizing:border-box;">
        <input type="text" id="user-name" placeholder="NOMBRE COMPLETO" style="width:100%; padding:14px; background:#222; border:1px solid var(--border); color:white; margin-bottom:15px; border-radius:5px; box-sizing:border-box;">
        
        <button class="btn-gold" onclick="processBooking()">CONFIRMAR MI CUPO</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#aaa; width:100%; margin-top:15px; cursor:pointer;">Regresar</button>
    </div>
</div>

<div id="modal-admin" class="overlay">
    <div class="modal" style="max-width: 500px;">
        <h2 style="color:var(--gold); text-align:center; font-family:'Barlow Condensed'; margin-bottom:15px;">PANEL ADMINISTRATIVO</h2>
        <p style="font-size:11px; color:#888; text-align:center; margin-bottom:20px;">LISTADO POR DÍA Y HORA CON OPCIÓN DE CANCELAR</p>
        <div id="admin-content" style="max-height: 450px; overflow-y: auto;"></div>
        <button class="btn-gold" onclick="document.getElementById('modal-admin').style.display='none'" style="margin-top:20px;">CERRAR PANEL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVbQMp5Ic-BTlM1VJIfTeLa0rLN6inBXE",
        authDomain: "machfit-cycling.firebaseapp.com",
        databaseURL: "https://machfit-cycling-default-rtdb.firebaseio.com",
        projectId: "machfit-cycling",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let reservations = {};
    let selectedDateStr = "";
    let selectedSlotKey = "";

    const baseSchedule = {
        'lunes': ['06:00-07:00', '07:00-08:00', '18:00-19:00', '19:00-20:00'],
        'martes': ['06:00-07:00'],
        'miercoles': ['06:00-07:00', '07:00-08:00', '18:00-19:00'],
        'jueves': ['06:00-07:00'],
        'viernes': ['06:00-07:00', '07:00-08:00', '18:00-19:00', '19:00-20:00']
    };

    function initCalendar() {
        const slider = document.getElementById('date-slider');
        slider.innerHTML = '';
        const now = new Date();
        const nextSaturday = new Date(now);
        nextSaturday.setDate(now.getDate() + (6 - now.getDay()));

        for (let d = new Date(now); d <= nextSaturday; d.setDate(d.getDate() + 1)) {
            let dayName = d.toLocaleDateString('es-EC', { weekday: 'long' }).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            if (dayName === 'domingo') continue;
            const dateStr = d.toLocaleDateString('es-EC', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const item = document.createElement('div');
            item.className = 'date-item';
            if (d.getDate() === now.getDate()) { item.classList.add('active'); selectDate(dateStr, item, dayName); }
            item.innerHTML = `<span>${dayName.substring(0,3)}</span><b>${d.getDate()}</b>`;
            item.onclick = () => selectDate(dateStr, item, dayName);
            slider.appendChild(item);
        }
    }

    window.selectDate = (dateStr, element, dayName) => {
        document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
        element.classList.add('active');
        selectedDateStr = dateStr;
        const container = document.getElementById('slots-container');
        container.innerHTML = `<h3 style="color:var(--gold); font-size:14px; margin: 15px 0;">RESERVAS PARA: ${dateStr}</h3>`;
        (baseSchedule[dayName] || []).forEach(h => {
            const key = `${dateStr.replace(/\//g,'')}_${h.replace(/:/g,'')}`;
            const count = Object.values(reservations).filter(r => r.slot === key).length;
            container.innerHTML += `<div class="slot" onclick="openModal('${h}', '${key}', '${dateStr}')">
                <div><b>${h}</b><br><small style="color:#888;">Instructor: Manu</small></div>
                <div class="status">${count}/11 OCUPADOS</div></div>`;
        });
    };

    window.openModal = (hour, key, dateStr) => {
        selectedSlotKey = key;
        document.getElementById('modal-title').innerText = hour;
        document.getElementById('modal-date-full').innerText = `Fecha: ${dateStr}`;
        
        const inscritos = Object.values(reservations).filter(r => r.slot === key).sort((a,b)=>a.bike-b.bike);
        const listDiv = document.getElementById('current-class-list');
        listDiv.innerHTML = inscritos.length ? inscritos.map(p => `<div class="list-row"><span><b>Bici #${p.bike}</b> - ${p.name}</span></div>`).join('') : '<p style="color:#555; font-size:11px; text-align:center;">Nadie inscrito aún.</p>';

        const taken = inscritos.map(r => parseInt(r.bike));
        const grid = document.getElementById('bikes-container');
        grid.innerHTML = ''; window.selectedBike = null;
        for(let i=1; i<=11; i++){
            const div = document.createElement('div');
            div.className = `bike ${taken.includes(i) ? 'taken' : ''}`;
            div.innerText = i;
            if(!taken.includes(i)) div.onclick = () => {
                document.querySelectorAll('.bike').forEach(b => b.classList.remove('selected'));
                div.classList.add('selected'); window.selectedBike = i;
            };
            grid.appendChild(div);
        }
        document.getElementById('modal-reserve').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal-reserve').style.display = 'none';

    window.processBooking = async () => {
        const code = document.getElementById('user-code').value.toUpperCase().trim();
        const name = document.getElementById('user-name').value.trim();
        if(!code || !name || !window.selectedBike) return alert("Completa todos los datos.");
        await push(ref(db, 'reservaciones'), { code, name, bike: window.selectedBike, slot: selectedSlotKey, date: selectedDateStr });
        alert("¡Reserva confirmada!"); closeModal();
    };

    onValue(ref(db, 'reservaciones'), (snap) => {
        reservations = snap.val() || {};
        initCalendar();
    });

    window.openAdmin = () => {
        if(prompt("Clave Master MachFit:") === "machfit2024") {
            const adminCont = document.getElementById('admin-content');
            adminCont.innerHTML = '';
            
            const grouped = {};
            Object.entries(reservations).forEach(([id, r]) => {
                const label = `${r.date} — ${r.slot.split('_')[1]}`;
                if(!grouped[label]) grouped[label] = [];
                grouped[label].push({ id, ...r });
            });

            Object.keys(grouped).sort().forEach(clase => {
                let itemsHtml = grouped[clase].sort((a,b)=>a.bike-b.bike).map(p => `
                    <div class="list-row" style="border-bottom-color:#333;">
                        <span><b>Bici #${p.bike}</b>: ${p.name} (${p.code})</span>
                        <button class="btn-del" onclick="deleteRes('${p.id}')">CANCELAR</button>
                    </div>`).join('');

                adminCont.innerHTML += `
                    <div style="background:#111; padding:12px; border-radius:8px; margin-bottom:15px; border-left:4px solid var(--gold);">
                        <b style="color:var(--gold); display:block; margin-bottom:8px;">${clase}</b>
                        ${itemsHtml}
                    </div>`;
            });
            document.getElementById('modal-admin').style.display = 'flex';
        }
    };

    window.deleteRes = async (id) => { 
        if(confirm("¿Deseas CANCELAR esta reserva de forma permanente?")) {
            await remove(ref(db, `reservaciones/${id}`));
            // Si el modal de admin está abierto, refrescamos la vista
            if(document.getElementById('modal-admin').style.display === 'flex') openAdmin();
        }
    };

    window.viewMyRes = () => {
        const code = document.getElementById('check-code').value.toUpperCase().trim();
        const res = Object.entries(reservations).filter(([id, r]) => r.code === code);
        document.getElementById('my-res-results').innerHTML = res.length ? res.map(([id, r]) => `
            <div style="background:#111; padding:12px; border-radius:8px; margin-bottom:8px; border-left:4px solid var(--gold); display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:13px;"><b>${r.date}</b><br>${r.slot.split('_')[1]} - Bici #${r.bike}</div>
                <button class="btn-del" onclick="deleteRes('${id}')">CANCELAR</button>
            </div>`).join('') : '<p style="color:#555; font-size:11px;">Código no encontrado.</p>';
    };

    initCalendar();
</script>
</body>
</html>
